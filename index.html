<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Real-time ASL Alphabet Translator using MediaPipe Hands and TensorFlow." />
  <title>ASL Translator — Real-Time Sign Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="assets/icons/favicon.png" />

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>

<body>

  <!-- ===== Header ===== -->
  <header class="app-header" role="banner">
    <div class="header-inner">
      <div class="logo-group">
        <span class="logo-text">ASL Translator</span>
      </div>
      <nav class="header-nav" aria-label="Header navigation">
        <div id="status-badge" class="status-badge status-idle" role="status" aria-live="polite">
          <span class="status-dot"></span>
          <span id="status-text">Ready</span>
        </div>
        <span id="hand-status" class="hand-tag hand-none">– No hand</span>
      </nav>
    </div>
  </header>

  <!-- ===== Main ===== -->
  <main class="app-main" role="main">

    <!-- ══ LEFT COLUMN: Camera ══ -->
    <section class="col-camera" aria-label="Camera feed and controls">

      <!-- Viewport -->
      <div class="camera-viewport" id="camera-viewport">
        <!-- Hidden raw video (source for MediaPipe) -->
        <video id="webcam-video" autoplay playsinline muted style="display:none" aria-hidden="true"></video>
        <!-- Main display canvas (mirrored video + landmarks) -->
        <canvas id="display-canvas" aria-label="Live feed with hand landmarks"></canvas>

        <!-- Overlay -->
        <div class="camera-overlay" id="camera-overlay">
          <div class="overlay-content">
            <div class="spinner" id="overlay-spinner"></div>
            <p id="overlay-message">Press "Start Camera" to begin.</p>
          </div>
        </div>
      </div>

      <!-- Controls row -->
      <div class="controls" role="group" aria-label="Camera controls">
        <button id="btn-start" class="btn btn-primary" type="button">▶ Start Camera</button>
        <button id="btn-stop" class="btn btn-secondary" type="button" disabled>■ Stop</button>
      </div>

      <!-- Crop preview + top prediction -->
      <div class="info-row">
        <!-- 224×224 crop preview -->
        <div class="crop-box">
          <p class="crop-label">Hand Crop (224×224)</p>
          <canvas id="crop-preview" width="112" height="112" aria-label="224×224 hand crop sent to model"></canvas>
        </div>

        <!-- Detected letter card -->
        <div class="top-prediction-card" id="top-prediction-card" aria-live="assertive">
          <span class="top-label">Detected</span>
          <span class="top-letter" id="top-letter">—</span>
          <span class="top-confidence" id="top-confidence">0%</span>
        </div>
      </div>


    </section>

    <!-- ══ RIGHT COLUMN: Reference + Text Builder ══ -->
    <section class="col-reference" aria-label="ASL reference chart and text output">

      <!-- ASL alphabet chart -->
      <div class="chart-card">
        <h2 class="chart-title">ASL Alphabet Reference</h2>
        <img src="assets/img/panduan-asl.jpg" alt="ASL alphabet chart showing hand signs for letters A–Z"
          class="asl-chart-img" id="asl-chart" />
      </div>


      <!-- Text builder -->
      <div class="text-builder-card">
        <div class="text-builder-header">
          <h3 class="text-builder-title">Translated Text <span id="status-dot" class="status-dot idle"></span></h3>
          <div class="text-btns">
            <button id="btn-speak" class="btn btn-ghost-sm" type="button" title="Speak">🔊 Speak</button>
            <button id="btn-backspace" class="btn btn-ghost-sm" type="button" title="Backspace">⌫</button>
            <button id="btn-clear-text" class="btn btn-ghost-sm" type="button" title="Clear all">✕ Clear</button>
          </div>
        </div>
        <textarea id="text-output" class="text-output" rows="4" placeholder="Confirmed letters will appear here…"
          aria-label="Translated text output"></textarea>
      </div>

    </section>

  </main>


  <!-- JS — order matters -->
  <script src="js/camera.js"></script>
  <script src="js/preprocessor.js"></script>
  <script src="js/model.js"></script>
  <script src="js/voting.js"></script>
  <script src="js/angleDetector.js"></script>
  <script src="js/app.js"></script>


</body>

</html>
